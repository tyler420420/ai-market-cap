<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TyCo's Positive Pre-Earnings Report Scanner</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
.container {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    text-align: center;
}
h1 {
    color: #58a6ff;
    font-size: 1.8em;
    margin-bottom: 8px;
}
.desc {
    color: #8b949e;
    font-size: 0.9em;
    margin-bottom: 30px;
}
label {
    display: block;
    text-align: left;
    color: #8b949e;
    font-size: 0.85em;
    margin-bottom: 6px;
}
input {
    width: 100%;
    padding: 12px 16px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    color: #c9d1d9;
    font-size: 1em;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
}
input:focus { border-color: #58a6ff; }
.btn {
    width: 100%;
    padding: 12px;
    background: #238636;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 1em;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
}
.btn:hover { background: #2ea043; }
.error {
    color: #ff6b6b;
    font-size: 0.85em;
    margin-bottom: 12px;
    display: none;
}
</style>
</head>
<body>
<div class="container">
    <h1>TyCo&apos;s Positive Pre-Earnings Report Scanner</h1>
    <p class="desc">Pre-Earnings Momentum | AI/Niche Sectors</p>
    <div class="error" id="errMsg">Incorrect password. Try again.</div>
    <form id="loginForm" method="POST" action="/login">
        <label>Password</label>
        <input type="password" name="password" id="pw" placeholder="Enter password" required autofocus>
        <button type="submit" class="btn">Access Scanner</button>
    </form>
</div>
</body>
</html>
