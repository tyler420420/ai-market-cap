<!DOCTYPE html><html><head><meta charset="UTF-8"><title>AI Market Cap Scanner</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Segoe UI,Arial,sans-serif;background:#0d1117;color:#c9d1d9;padding:20px}.header{background:linear-gradient(135deg,#1a1f2e,#161b22);padding:25px;border-radius:12px;margin-bottom:20px;border:1px solid #30363d}.hdr-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:15px}h1{color:#58a6ff;font-size:1.8em;margin-bottom:5px}.desc{color:#8b949e;font-size:0.95em}.btn{background:#238636;border:none;color:#fff;padding:10px 22px;border-radius:6px;font-size:0.9em;cursor:pointer;font-weight:bold;flex-shrink:0}.btn:hover{background:#2ea043}.btn:disabled{background:#444;cursor:not-allowed}#refreshBtn{background:#1f6feb}#refreshBtn:hover{background:#388bfd}.ticker-strip{display:flex;overflow:hidden;white-space:nowrap;background:#0a0f18;border-bottom:1px solid #30363d;padding:8px 0;font-size:0.82em}.ticker-strip-inner{display:flex;gap:0;animation:scroll-ticker 40s linear infinite}.ticker-item{display:inline-flex;align-items:center;gap:6px;padding:0 18px;border-right:1px solid #30363d;flex-shrink:0}.ticker-sym{font-weight:bold;color:#58a6ff}.ticker-price{color:#c9d1d9}.ticker-up{color:#00ff88}.ticker-dn{color:#ff6b6b}@keyframes scroll-ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}.ticker-strip:hover .ticker-strip-inner{animation-play-state:paused}.updated{margin-top:12px;color:#6e7681;font-size:0.85em}.warn{margin-top:10px;padding:10px 15px;background:#1f2937;border-left:3px solid #f0883e;border-radius:4px;font-size:0.82em;color:#8b949e;display:none}.legend{display:flex;gap:20px;margin:0;font-size:0.85em;flex-wrap:wrap}.legend span{display:flex;align-items:center;gap:6px}.dot{width:12px;height:12px;border-radius:50%}.stats-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:15px;margin:15px 0}.stat{background:#161b22;padding:12px 18px;border-radius:8px;text-align:center;border:1px solid #30363d;min-width:90px}.stat-val{font-size:1.4em;font-weight:bold;color:#58a6ff}.stat-lbl{font-size:0.75em;color:#8b949e;margin-top:3px}table{width:100%;border-collapse:collapse;background:#161b22;border-radius:8px;overflow:hidden;margin-top:10px}th{background:#1f2937;padding:10px 12px;text-align:left;font-size:0.78em;color:#8b949e;text-transform:uppercase;border-bottom:2px solid #30363d;cursor:pointer;user-select:none;white-space:nowrap}th:hover{color:#c9d1d9}th.sorted-asc::after{content:" ▲";color:#00ff88}th.sorted-desc::after{content:" ▓";color:#00ff88}td{padding:18px 12px;border-bottom:1px solid #30363d;font-size:0.88em}tr{height:54px}tr:hover{background:#1c2128}.note{margin-top:20px;padding:12px 18px;background:#161b22;border-radius:8px;font-size:0.82em;color:#8b949e;border:1px solid #30363d}.disclaimer{margin-top:12px;padding:12px 18px;background:#1a1a1a;border-radius:8px;font-size:0.80em;color:#999;border:1px solid #c0392b}.pick-banner{background:linear-gradient(135deg,#1a2a1a,#162016);border:1px solid #2ea043;border-radius:8px;padding:40px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;min-height:120px}#chat-btn{position:fixed;bottom:24px;right:24px;background:#238636;color:#fff;border:none;border-radius:8px;padding:12px 24px;font-size:0.95em;font-weight:bold;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.5);z-index:9999;transition:background .2s}#chat-btn:hover{background:#2ea043}#chat-panel{position:fixed;bottom:80px;right:24px;width:360px;max-height:520px;background:#161b22;border:1px solid #30363d;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.6);display:none;flex-direction:column;z-index:9998;overflow:hidden}#chat-panel.open{display:flex}#chat-header{background:#1f2937;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #30363d}#chat-header span{font-weight:bold;color:#58a6ff;font-size:1em}#chat-close{background:none;border:none;color:#8b949e;font-size:1.2em;cursor:pointer;padding:0;line-height:1}#chat-close:hover{color:#fff}#chat-msgs{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;min-height:200px;max-height:340px}.msg{font-size:0.88em;line-height:1.5;padding:10px 14px;border-radius:10px;max-width:85%}.msg-user{background:#238636;color:#fff;align-self:flex-end;border-bottom-right-radius:3px}.msg-bot{background:#1f2937;color:#c9d1d9;align-self:flex-start;border-bottom-left-radius:3px}.msg-bot.loading{color:#8b949e;font-style:italic}#chat-input-row{display:flex;border-top:1px solid #30363d;padding:10px 12px;gap:8px}#chat-input{flex:1;background:#0d1117;border:1px solid #30363d;border-radius:8px;color:#c9d1d9;padding:8px 12px;font-size:0.88em;resize:none;outline:none;font-family:Segoe UI,Arial,sans-serif}#chat-input:focus{border-color:#58a6ff}#chat-send{background:#238636;border:none;color:#fff;border-radius:8px;padding:8px 16px;font-size:0.88em;cursor:pointer;font-weight:bold}#chat-send:hover{background:#2ea043}#chat-send:disabled{background:#444;cursor:not-allowed}</style></head><body><button id="chat-btn" onclick="toggleChat()">Chat</button><div id="chat-panel"><div id="chat-header"><span>AI Scanner Assistant</span><button id="chat-close" onclick="toggleChat()">X</button></div><div id="chat-msgs"><div class="msg msg-bot">Hi! I can answer questions about how the scanner works, what the scores mean, or how to read the trade signals.</div></div><div id="chat-input-row"><input id="chat-input" type="text" placeholder="Ask a question..." onkeydown="if(event.key==='Enter'&&!event.shiftKey)sendMsg()"/><button id="chat-send" onclick="sendMsg()">Send</button></div></div><script>var chatOpen=false;function toggleChat(){chatOpen=!chatOpen;var p=document.getElementById("chat-panel");if(chatOpen){p.style.display="flex";}else{p.style.display="none";}}function sendMsg(){var i=document.getElementById("chat-input");var m=i.value.trim();if(!m)return;var ms=document.getElementById("chat-msgs");var userDiv=document.createElement("div");userDiv.className="msg msg-user";userDiv.textContent=m;ms.appendChild(userDiv);ms.scrollTop=ms.scrollHeight;i.value="";var b=document.getElementById("chat-send");b.disabled=true;b.textContent="...";var loadingDiv=document.createElement("div");loadingDiv.className="msg msg-bot loading";loadingDiv.textContent="Thinking...";ms.appendChild(loadingDiv);ms.scrollTop=ms.scrollHeight;fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:m})}).then(function(r){return r.ok?r.json():Promise.reject("Server error");}).then(function(d){loadingDiv.remove();var botDiv=document.createElement("div");botDiv.className="msg msg-bot";botDiv.textContent=d.reply||"Got it.";ms.appendChild(botDiv);ms.scrollTop=ms.scrollHeight;}).catch(function(e){loadingDiv.remove();var errDiv=document.createElement("div");errDiv.className="msg msg-bot";errDiv.textContent="Error: "+e;ms.appendChild(errDiv);ms.scrollTop=ms.scrollHeight;}).finally(function(){b.disabled=false;b.textContent="Send";});}</script></body></html>
