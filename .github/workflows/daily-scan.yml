name: Daily Scanner

on:
  schedule:
    # 6:30 AM Pacific Time (13:30 UTC) every day
    - cron: '30 13 * * *'
  workflow_dispatch:  # Manual trigger anytime

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scanner
        run: |
          python ai_earnings_scanner.py --local

      - name: Build scanner.html from output
        run: |
          # ai_earnings_today.html has full HTML with embedded rowsData
          # Copy to scanner.html so Railway's Flask app serves fresh data at /
          cp ai_earnings_today.html scanner.html

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        run: |
          git add scanner.html scanner_data.json ai_earnings_today.html
          git diff --cached --quiet || (git commit -m "Auto-scan: $(date '+%Y-%m-%d %H:%M PT')" && git push)
